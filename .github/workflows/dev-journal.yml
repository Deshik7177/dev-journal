name: Dev Journal Activity

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  journal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Activity
        run: |

          git config --global user.name "Deshik7177"
          git config --global user.email "pdhanadeshik7177@gmail.com"

          CHANCE=$((RANDOM % 100))

          # 30% chance skip
          if [ $CHANCE -lt 30 ]; then
            echo "No activity generated."
            exit 0
          fi

          FILES=(
            "learning-log.md"
            "project-ideas.md"
            "tech-notes.md"
            "monthly-progress.md"
          )

          NOTES=(
            "Reviewed FastAPI architecture"
            "Studied ESP32 communication protocols"
            "Explored ROS2 concepts"
            "Researched YOLO model optimization"
            "Documented deployment workflow"
            "Updated robotics research notes"
            "Investigated database indexing"
            "Analyzed SDN routing strategies"
            "Learned Docker networking concepts"
            "Explored AWS deployment methods"
            "Documented machine learning findings"
            "Updated project roadmap"
          )

          MESSAGES=(
            "docs: update development notes"
            "docs: add research findings"
            "chore: update engineering journal"
            "docs: revise learning log"
            "docs: update progress tracker"
            "chore: maintain project notes"
            "docs: add technical observations"
          )

          FILE=${FILES[$RANDOM % ${#FILES[@]}]}
          NOTE=${NOTES[$RANDOM % ${#NOTES[@]}]}
          MESSAGE=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}

          echo "- $(date '+%Y-%m-%d %H:%M:%S'): $NOTE" >> "$FILE"

          git add .

          git commit -m "$MESSAGE" || exit 0

          git pull origin main --rebase

          git push origin main
